name: Auto Matches

# Runs the World Cup Shorts automation cycle: fetch fixtures, render the
# prediction Short for any match kicking off within the next 24h, upload it
# to YouTube, and commit the updated idempotency state back to the repo.
on:
  schedule:
    # Every hour, on the hour (UTC). GitHub cron does not honour DST.
    - cron: "0 * * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

# Allow the workflow to push the updated state files back to the repo.
permissions:
  contents: write

# Never run two cycles at once: overlapping runs could double-upload or
# collide when pushing state. Queue instead of cancelling a live upload.
concurrency:
  group: auto-matches
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore credentials from secrets
        env:
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: |
          mkdir -p credentials
          printf '%s' "$GOOGLE_CLIENT_SECRET" > credentials/client_secret.json
          printf '%s' "$YOUTUBE_TOKEN" > credentials/token.json

      - name: Run automation cycle
        run: python main.py auto_matches

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Only the idempotency / rotation / attributes state — NOT the
          # regenerated fixtures/odds (those are rebuilt every run).
          git add data/processed_matches.json \
                  data/cta_index.json \
                  data/match_music_index.json \
                  data/video_attributes.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update pipeline state [skip ci]"
            git push
          fi
